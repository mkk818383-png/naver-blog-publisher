<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 발행글</title>
    <style>
        body {
            font-family: e-nanumgothic, arial, \B098\B214\ACE0\B515, nanumgothic, sans-serif;
            font-size: 16px;
            line-height: 200%;
            color: #333333;
            max-width: 750px;
            margin: 0 auto;
            padding: 20px;
            word-break: keep-all;
        }
        h2, h3 {
            font-size: 19px;
            font-weight: bold;
            margin-top: 40px;
            margin-bottom: 20px;
            color: #111111;
            line-height: 140%;
        }
        p {
            margin-bottom: 24px;
        }
        ul, ol {
            margin-bottom: 24px;
            padding-left: 20px;
        }
        li {
            margin-bottom: 8px;
        }
        figure {
            text-align: center;
            margin: 30px 0;
        }
        .photo-placeholder {
            background-color: #f9f9f9;
            border: 1.5px dashed #cccccc;
            border-radius: 8px;
            padding: 50px 20px;
            color: #777777;
            font-size: 14px;
            text-align: center;
            margin-bottom: 8px;
        }
        figcaption {
            font-size: 14px;
            color: #666666;
            font-family: e-nanumgothic, arial, \B098\B214\ACE0\B515, nanumgothic, sans-serif;
            margin-top: 6px;
            font-weight: 500;
        }
    </style>
</head>
